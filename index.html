<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Géométrie 5ème : Les 6 Exercices d'Angles</title>
    <style>
        :root {
            --bg-color: #0b0b0c;
            --card-bg: #16161a;
            --accent-color: #39ff14;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --border-color: #2c2c2e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            max-width: 750px;
            width: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
            text-align: center;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 800;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        .header .subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            background-color: #222227;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px;
            color: var(--text-main);
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 15px;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        .consigne {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
            color: var(--text-muted);
        }
        
        .question-box {
            background-color: #1e1e24;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
        }

        .geometry-container {
            background-color: #222227;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .geometry-svg {
            max-width: 100%;
            height: auto;
        }

        .statement-text {
            font-size: 16px;
            font-weight: 500;
            text-align: left;
            line-height: 1.6;
            margin-top: 15px;
            color: #ffffff;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button.action-btn {
            flex: 1;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-start {
            background-color: var(--accent-color);
            color: #000000;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-submit {
            background-color: var(--accent-color);
            color: #000000;
        }

        .btn-skip {
            background-color: #2c2c2e;
            color: #e5e5ea;
            border: 1px solid #48484a;
        }
        
        .progress-bar {
            background-color: #2c2c2e;
            border-radius: 4px;
            height: 6px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            background-color: var(--accent-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .indicator {
            text-align: right;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .result-box {
            background: #1e1e24;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
            margin-top: 20px;
            text-align: center;
        }

        .score-display {
            font-size: 48px;
            font-weight: 800;
            color: var(--accent-color);
            margin: 15px 0;
        }
        
        table.bilan {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }

        table.bilan th, table.bilan td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .row-correct { color: var(--accent-color); }
        .row-incorrect { color: #ff453a; }
        .row-skipped { color: #e5e5ea; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Géométrie : Les 6 Exercices d'Angles</h1>
        <div class="subtitle">Parallèles, sécantes et vocabulaire — Niveau 5ème</div>
    </div>

    <!-- ETAPE 1 : IDENTIFICATION -->
    <div id="panel-login" class="step-panel" style="display: block;">
        <div style="margin-bottom: 20px;">
            <label for="student-name">Nom et Prénom de l'élève :</label>
            <input type="text" id="student-name" placeholder="Ex: Lucas Petit" autocomplete="off">
        </div>
        <button class="btn-start" onclick="startTest()">Démarrer l'évaluation</button>
    </div>

    <!-- ETAPE 2 : EXERCICES -->
    <div id="panel-quiz" class="step-panel" style="display: none;">
        <div class="indicator">Exercice <span id="current-q">1</span> / 6</div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        
        <div class="consigne" id="q-consigne">Analyse la figure géométrique pour répondre à la question.</div>
        
        <div class="question-box">
            <div class="geometry-container" id="q-vector"></div>
            <div class="statement-text" id="q-statement"></div>
        </div>
        
        <div style="background-color: #1e1e24; padding: 20px; border-radius: 8px; border: 1px solid var(--border-color);">
            <div>
                <label for="user-answer" id="label-reponse">Ta réponse :</label>
                <input type="text" id="user-answer" placeholder="..." autocomplete="off">
            </div>
            
            <div class="btn-group">
                <button class="action-btn btn-skip" onclick="skipQuestion()">Passer ⏭️</button>
                <button class="action-btn btn-submit" id="btn-validate" onclick="submitAnswer()">Valider la réponse</button>
            </div>
        </div>
    </div>

    <!-- ETAPE 3 : BILAN -->
    <div id="panel-results" class="step-panel" style="display: none;">
        <div class="result-box">
            <h2>Évaluation terminée</h2>
            <p>Élève : <span id="res-name" style="font-weight: bold; color: #fff;">...</span></p>
            <div class="score-display" id="res-grade">0 / 6</div>
        </div>

        <h3 style="margin-top:30px; color: var(--text-main); font-size:14px; text-transform:uppercase; border-bottom:1px solid var(--border-color); padding-bottom:8px;">Bilan par Exercice</h3>
        <table class="bilan">
            <thead>
                <tr>
                    <th>Exercice</th>
                    <th>Ta réponse</th>
                    <th>Correction attendue</th>
                </tr>
            </thead>
            <tbody id="bilan-table-body"></tbody>
        </table>

        <button class="btn-start" style="margin-top: 30px;" onclick="window.location.reload()">Recommencer la série</button>
    </div>
</div>

<script>
    let quizQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let studentName = "";

    function buildQuizData() {
        quizQuestions = [];

        // --- EXERCICE 1 : Vocabulaire de base (Alternes-internes / Correspondants) ---
        const svgEx1 = `
            <svg class="geometry-svg" width="320" height="150" viewBox="0 0 320 150">
                <line x1="20" y1="40" x2="300" y2="40" stroke="#ffffff" stroke-width="2"/>
                <line x1="20" y1="110" x2="300" y2="110" stroke="#ffffff" stroke-width="2"/>
                <line x1="70" y1="15" x2="250" y2="135" stroke="#39ff14" stroke-width="2"/>
                <text x="290" y="35" fill="#8e8e93" font-size="12">d1</text>
                <text x="290" y="105" fill="#8e8e93" font-size="12">d2</text>
                <text x="55" y="20" fill="#8e8e93" font-size="12">Δ</text>
                <!-- Arc angle 1 (alterne-interne haut gauche) -->
                <path d="M 108 40 A 15 15 0 0 1 117 46 L 108 40 Z" fill="rgba(255,69,58,0.5)" stroke="#ff453a"/>
                <text x="120" y="55" fill="#ff453a" font-size="12" font-weight="bold">1</text>
                <!-- Arc angle 2 (alterne-interne bas droite) -->
                <path d="M 212 110 A 15 15 0 0 1 203 104 L 212 110 Z" fill="rgba(255,69,58,0.5)" stroke="#ff453a"/>
                <text x="190" y="100" fill="#ff453a" font-size="12" font-weight="bold">2</text>
            </svg>`;
        quizQuestions.push({
            title: "Exercice 1 : Reconnaissance",
            svg: svgEx1,
            statement: "Sur cette figure, comment appelle-t-on la relation géométrique entre les angles rouges <b>1</b> et <b>2</b> formés par les droites (d1), (d2) et la sécante (Δ) ?",
            answer: "alternes-internes",
            hint: "Écris ta réponse en minuscules (ex: correspondants, opposés par le sommet...)",
            check: function(u) {
                let s = u.toLowerCase().trim().replace(/ /g, "").replace(/-/g, "").replace(/é/g, "e");
                return s.includes("alterne") && s.includes("interne");
            }
        });

        // --- EXERCICE 2 : Vocabulaire Opposés par le Sommet / Supplémentaires ---
        const svgEx2 = `
            <svg class="geometry-svg" width="320" height="150" viewBox="0 0 320 150">
                <line x1="30" y1="75" x2="290" y2="75" stroke="#ffffff" stroke-width="2"/>
                <line x1="80" y1="15" x2="240" y2="135" stroke="#39ff14" stroke-width="2"/>
                <circle cx="160" cy="75" r="3" fill="#ffffff"/>
                <text x="155" y="95" fill="#ffffff" font-size="12" font-weight="bold">O</text>
                <!-- Angle xOy -->
                <path d="M 160 75 L 180 75 A 20 20 0 0 0 173 65 Z" fill="rgba(0,122,255,0.5)" stroke="#007aff"/>
                <text x="185" y="70" fill="#007aff" font-size="12" font-weight="bold">x</text>
                <!-- Angle zOt opposé -->
                <path d="M 160 75 L 140 75 A 20 20 0 0 0 147 85 Z" fill="rgba(0,122,255,0.5)" stroke="#007aff"/>
                <text x="130" y="85" fill="#007aff" font-size="12" font-weight="bold">y</text>
            </svg>`;
        quizQuestions.push({
            title: "Exercice 2 : Angles au sommet",
            svg: svgEx2,
            statement: "Les deux droites se coupent en un point unique O. Les deux angles bleus marqués <b>x</b> et <b>y</b> sont dits...",
            answer: "opposes par le sommet",
            hint: "Complète la propriété géométrique attendue :",
            check: function(u) {
                let s = u.toLowerCase().trim().replace(/é/g, "e");
                return s.includes("oppose") && s.includes("sommet");
            }
        });

        // --- EXERCICE 3 : Propriétés d'égalités et angles supplémentaires ---
        const svgEx3 = `
            <svg class="geometry-svg" width="320" height="150" viewBox="0 0 320 150">
                <line x1="20" y1="75" x2="300" y2="75" stroke="#ffffff" stroke-width="2"/>
                <line x1="120" y1="15" x2="200" y2="135" stroke="#007aff" stroke-width="2"/>
                <text x="240" y="65" fill="#ff9500" font-size="13" font-weight="bold">72°</text>
                <text x="110" y="65" fill="#39ff14" font-size="13" font-weight="bold">?</text>
                <path d="M 160 75 L 200 75 A 15 15 0 0 0 165 65 Z" fill="none" stroke="#ff9500"/>
                <path d="M 160 75 L 120 75 A 15 15 0 0 1 155 65 Z" fill="none" stroke="#39ff14"/>
            </svg>`;
        quizQuestions.push({
            title: "Exercice 3 : Angles supplémentaires",
            svg: svgEx3,
            statement: "Ces deux angles sont adjacents et forment ensemble un angle plat (droite horizontale). Si l'angle orange mesure <b>72°</b>, calcule la valeur de l'angle vert inconnu marqué <b>?</b> :",
            answer: "108",
            hint: "Donne uniquement le nombre de degrés (sans le symbole °)",
            check: function(u) { return parseInt(u.trim()) === 108; }
        });

        // --- EXERCICE 4 : Calculs et Perpendicularité (Modèle corrigé et rigoureux) ---
        const svgEx4 = `
            <svg class="geometry-svg" width="340" height="180" viewBox="0 0 340 180">
                <!-- Deux droites horizontales strictement parallèles -->
                <line x1="20" y1="50" x2="300" y2="50" stroke="#ffffff" stroke-width="2"/>
                <line x1="20" y1="130" x2="300" y2="130" stroke="#ffffff" stroke-width="2"/>
                <!-- Une droite AB parfaitement verticale à 90° -->
                <line x1="70" y1="20" x2="70" y2="160" stroke="#8e8e93" stroke-width="2"/>
                <!-- Une sécante verte coupant les droites aux points C et D -->
                <line x1="40" y1="155" x2="260" y2="20" stroke="#39ff14" stroke-width="2"/>
                <!-- Symboles des angles droits parfaits -->
                <rect x="70" y="50" width="10" height="10" fill="none" stroke="#39ff14" stroke-width="1.5"/>
                <rect x="70" y="120" width="10" height="10" fill="none" stroke="#39ff14" stroke-width="1.5"/>
                <!-- Marquages des points -->
                <text x="55" y="45" fill="#fff" font-size="13" font-weight="bold">A</text>
                <text x="55" y="145" fill="#fff" font-size="13" font-weight="bold">B</text>
                <text x="210" y="45" fill="#fff" font-size="13" font-weight="bold">C</text>
                <text x="150" y="145" fill="#fff" font-size="13" font-weight="bold">D</text>
                <!-- Arc angle obtus donné en D -->
                <path d="M 160 130 A 20 20 0 0 0 177 141 L 160 130 Z" fill="rgba(255,149,0,0.4)" stroke="#ff9500" stroke-width="1.5"/>
                <text x="175" y="160" fill="#ff9500" font-size="13" font-weight="bold">125°</text>
                <text x="195" y="70" fill="#39ff14" font-size="13" font-weight="bold">̂ACD = ?</text>
            </svg>`;
        quizQuestions.push({
            title: "Exercice 4 : Propriétés combinées",
            svg: svgEx4,
            statement: "Les droites (AB) et (AC) sont perpendiculaires, tout comme (AB) et (BD). La sécante verte crée un angle mesurant <b>125°</b> au sommet D. Calcule la mesure exacte de l'angle aigu <b>̂ACD</b> en degrés :",
            answer: "35",
            hint: "Pense aux propriétés des droites parallèles (125° - 90°)",
            check: function(u) { return parseInt(u.trim()) === 35; }
        });

        // --- EXERCICE 5 : Justification de droites parallèles ---
        const svgEx5 = `
            <svg class="geometry-svg" width="320" height="150" viewBox="0 0 320 150">
                <line x1="20" y1="40" x2="300" y2="40" stroke="#ffffff" stroke-width="2"/>
                <line x1="20" y1="110" x2="300" y2="110" stroke="#ffffff" stroke-width="2"/>
                <line x1="80" y1="15" x2="240" y2="135" stroke="#ff9500" stroke-width="2"/>
                <text x="135" y="35" fill="#39ff14" font-size="12" font-weight="bold">64°</text>
                <text x="175" y="130" fill="#39ff14" font-size="12" font-weight="bold">64°</text>
            </svg>`;
        quizQuestions.push({
            title: "Exercice 5 : Réciproque",
            svg: svgEx5,
            statement: "Deux droites sont coupées par une sécante orange. On constate que deux angles **alternes-internes** mesurent exactement tous les deux **64°**. Les deux droites blanches sont-elles parallèles ? (Réponds par <b>OUI</b> ou <b>NON</b>)",
            answer: "OUI",
            hint: "Tape simplement OUI ou NON",
            check: function(u) { return u.toUpperCase().trim() === "OUI"; }
        });

        // --- EXERCICE 6 : Démonstration finale en cascade ---
        const svgEx6 = `
            <svg class="geometry-svg" width="340" height="160" viewBox="0 0 340 160">
                <!-- Lignes horizontales principales FA et CB -->
                <line x1="20" y1="45" x2="320" y2="45" stroke="#ffffff" stroke-width="2"/>
                <line x1="20" y1="125" x2="320" y2="125" stroke="#ffffff" stroke-width="2"/>
                <!-- Formations des sécantes -->
                <line x1="50" y1="45" x2="130" y2="125" stroke="#8e8e93" stroke-width="1.5"/>
                <line x1="190" y1="45" x2="130" y2="125" stroke="#8e8e93" stroke-width="1.5"/>
                <text x="45" y="35" fill="#fff" font-size="12" font-weight="bold">F</text>
                <text x="190" y="35" fill="#fff" font-size="12" font-weight="bold">A</text>
                <text x="125" y="142" fill="#fff" font-size="12" font-weight="bold">C</text>
                <!-- Données de l'exercice -->
                <text x="65" y="65" fill="#ff453a" font-size="12">58°</text>
                <text x="160" y="65" fill="#ff9500" font-size="12">71°</text>
                <text x="125" y="110" fill="#39ff14" font-size="12">?</text>
            </svg>`;
        quizQuestions.push({
            title: "Exercice 6 : Synthèse de cours",
            svg: svgEx6,
            statement: "En sachant que les droites du haut et du bas sont strictement parallèles, utilise la règle sur les angles alternes-internes (et l'angle plat au sommet A) pour trouver la mesure de l'angle vert <b>̂FCA</b> marqué d'un <b>?</b> :",
            answer: "51",
            hint: "Indice : 180° - (58° + 71°)",
            check: function(u) { return parseInt(u.trim()) === 51; }
        });
    }

    function startTest() {
        const nameInput = document.getElementById("student-name").value.trim();
        if (nameInput === "") { alert("Veuillez inscrire vos identifiants avant de commencer."); return; }
        studentName = nameInput;
        
        currentIndex = 0;
        score = 0;
        buildQuizData();
        
        document.getElementById("panel-login").style.display = "none";
        document.getElementById("panel-quiz").style.display = "block";
        
        loadQuestion();
    }

    function loadQuestion() {
        if (currentIndex >= quizQuestions.length) { endTest(); return; }
        const q = quizQuestions[currentIndex];
        
        document.getElementById("current-q").innerText = currentIndex + 1;
        document.getElementById("q-vector").innerHTML = q.svg;
        document.getElementById("q-statement").innerHTML = `<b>${q.title}</b><br><br>${q.statement}`;
        
        const inputField = document.getElementById("user-answer");
        inputField.value = "";
        inputField.placeholder = q.hint;
        inputField.focus();
        
        document.getElementById("progress-fill").style.width = (currentIndex / quizQuestions.length) * 100 + "%";
    }

    function submitAnswer() {
        if (currentIndex >= quizQuestions.length) return;
        const q = quizQuestions[currentIndex];
        let userAnswer = document.getElementById("user-answer").value.trim();
        if (!userAnswer) { alert("Tu dois écrire une réponse !"); return; }
        
        q.savedAns = userAnswer;
        if (q.check(userAnswer)) {
            q.status = "correct";
            score++;
        } else {
            q.status = "incorrect";
        }
        
        currentIndex++; 
        loadQuestion();
    }

    function skipQuestion() {
        if (currentIndex >= quizQuestions.length) return;
        const q = quizQuestions[currentIndex];
        q.status = "skipped"; 
        q.savedAns = "Non répondu ⏭️";
        currentIndex++; 
        loadQuestion();
    }

    function endTest() {
        document.getElementById("panel-quiz").style.display = "none";
        document.getElementById("panel-results").style.display = "block";
        
        document.getElementById("res-name").innerText = studentName;
        const displayGrade = document.getElementById("res-grade");
        displayGrade.innerText = `${score} / ${quizQuestions.length}`;
        
        if(score >= 5) displayGrade.style.color = "var(--accent-color)";
        else if(score >= 3) displayGrade.style.color = "#ff9500";
        else displayGrade.style.color = "#ff453a";

        const tableBody = document.getElementById("bilan-table-body");
        tableBody.innerHTML = ""; 
        
        for (let i = 0; i < quizQuestions.length; i++) {
            const q = quizQuestions[i];
            const row = document.createElement("tr");
            
            if (q.status === "correct") row.className = "row-correct";
            else if (q.status === "skipped") row.className = "row-skipped";
            else row.className = "row-incorrect";
            
            const badgeCorrection = q.status === "correct" 
                ? `<span>Correct ✅</span>` 
                : `<span style="font-weight:bold; color:#ff453a;">Attendu : ${q.answer}</span>`;
                
            row.innerHTML = `<td><strong>${q.title}</strong></td><td>${q.savedAns}</td><td>${badgeCorrection}</td>`;
            tableBody.appendChild(row);
        }
    }

    document.getElementById("user-answer").addEventListener("keyup", function(e) { 
        if (e.key === "Enter") submitAnswer(); 
    });
</script>
</body>
</html>
