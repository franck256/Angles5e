<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Géométrie 5ème : Les 6 Exercices d'Angles</title>
    <style>
        :root {
            --bg-color: #0b0b0c;
            --card-bg: #16161a;
            --accent-color: #39ff14;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --border-color: #2c2c2e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            max-width: 750px;
            width: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
            text-align: center;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 800;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        .header .subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            background-color: #222227;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px;
            color: var(--text-main);
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 5px;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        .hint-text {
            font-size: 12px;
            color: #ff9500;
            margin-bottom: 15px;
            display: block;
        }

        .consigne {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
            color: var(--text-muted);
        }
        
        .question-box {
            background-color: #1e1e24;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
        }

        .geometry-container {
            background-color: #1c1c1e;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .geometry-svg {
            max-width: 100%;
            height: auto;
        }

        .statement-text {
            font-size: 16px;
            font-weight: 500;
            text-align: left;
            line-height: 1.6;
            margin-top: 15px;
            color: #ffffff;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button.action-btn {
            flex: 1;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-start {
            background-color: var(--accent-color);
            color: #000000;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-submit {
            background-color: var(--accent-color);
            color: #000000;
        }

        .btn-skip {
            background-color: #2c2c2e;
            color: #e5e5ea;
            border: 1px solid #48484a;
        }
        
        .progress-bar {
            background-color: #2c2c2e;
            border-radius: 4px;
            height: 6px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            background-color: var(--accent-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .indicator {
            text-align: right;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .result-box {
            background: #1e1e24;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
            margin-top: 20px;
            text-align: center;
        }

        .score-display {
            font-size: 48px;
            font-weight: 800;
            color: var(--accent-color);
            margin: 15px 0;
        }
        
        table.bilan {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }

        table.bilan th, table.bilan td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .row-correct { color: var(--accent-color); }
        .row-incorrect { color: #ff453a; }
        .row-skipped { color: #e5e5ea; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Géométrie : Les 6 Exercices d'Angles</h1>
        <div class="subtitle">Trigonométrie SVG absolue — Niveau 5ème</div>
    </div>

    <!-- ETAPE 1 : IDENTIFICATION -->
    <div id="panel-login" class="step-panel" style="display: block;">
        <div style="margin-bottom: 20px;">
            <label for="student-name">Nom et Prénom de l'élève :</label>
            <input type="text" id="student-name" placeholder="Ex: Lucas Petit" autocomplete="off">
        </div>
        <button class="btn-start" onclick="startTest()">Démarrer l'évaluation</button>
    </div>

    <!-- ETAPE 2 : EXERCICES -->
    <div id="panel-quiz" class="step-panel" style="display: none;">
        <div class="indicator">Exercice <span id="current-q">1</span> / 6</div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        
        <div class="consigne" id="q-consigne">Analyse la figure géométrique pour répondre à la question.</div>
        
        <div class="question-box">
            <div class="geometry-container" id="q-vector"></div>
            <div class="statement-text" id="q-statement"></div>
        </div>
        
        <div style="background-color: #1e1e24; padding: 20px; border-radius: 8px; border: 1px solid var(--border-color);">
            <div>
                <label for="user-answer" id="label-reponse">Ta réponse :</label>
                <input type="text" id="user-answer" placeholder="Écris ta réponse ici..." autocomplete="off">
                <span class="hint-text" id="q-hint"></span>
            </div>
            
            <div class="btn-group">
                <button class="action-btn btn-skip" onclick="skipQuestion()">Passer ⏭️</button>
                <button class="action-btn btn-submit" id="btn-validate" onclick="submitAnswer()">Valider la réponse</button>
            </div>
        </div>
    </div>

    <!-- ETAPE 3 : BILAN -->
    <div id="panel-results" class="step-panel" style="display: none;">
        <div class="result-box">
            <h2>Évaluation terminée</h2>
            <p>Élève : <span id="res-name" style="font-weight: bold; color: #fff;">...</span></p>
            <div class="score-display" id="res-grade">0 / 6</div>
        </div>

        <h3 style="margin-top:30px; color: var(--text-main); font-size:14px; text-transform:uppercase; border-bottom:1px solid var(--border-color); padding-bottom:8px;">Bilan par Exercice</h3>
        <table class="bilan">
            <thead>
                <tr>
                    <th>Exercice</th>
                    <th>Ta réponse</th>
                    <th>Correction attendue</th>
                </tr>
            </thead>
            <tbody id="bilan-table-body"></tbody>
        </table>

        <button class="btn-start" style="margin-top: 30px;" onclick="window.location.reload()">Recommencer la série</button>
    </div>
</div>

<script>
    let quizQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let studentName = "";

    // Fonction de génération géométrique des secteurs angulaires
    function generateSVGAngle(cx, cy, startDeg, endDeg, radius, label, color, isTextColored = false) {
        let startRad = (startDeg * Math.PI) / 180;
        let endRad = (endDeg * Math.PI) / 180;
        
        let x1 = cx + radius * Math.cos(startRad);
        let y1 = cy + radius * Math.sin(startRad);
        let x2 = cx + radius * Math.cos(endRad);
        let y2 = cy + radius * Math.sin(endRad);
        
        let largeArc = Math.abs(endDeg - startDeg) > 180 ? 1 : 0;
        let sweep = endDeg > startDeg ? 1 : 0;
        
        let midRad = (((startDeg + endDeg) / 2) * Math.PI) / 180;
        let textDist = radius * 0.55; 
        let tx = cx + textDist * Math.cos(midRad);
        let ty = cy + textDist * Math.sin(midRad) + 4; 
        
        let pathD = `M ${cx} ${cy} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} ${sweep} ${x2} ${y2} Z`;
        
        let fillStyle = color.startsWith('#') ? color : `var(${color})`;
        let strokeStyle = color.startsWith('#') ? color : `var(${color})`;
        let textStyle = isTextColored ? strokeStyle : '#ffffff';

        return `
            <path d="${pathD}" fill="${fillStyle}" fill-opacity="0.25" stroke="${strokeStyle}" stroke-width="1.5" />
            <text x="${tx}" y="${ty}" fill="${textStyle}" font-size="11" font-weight="bold" text-anchor="middle">${label}</text>
        `;
    }

    function buildQuizData() {
        quizQuestions = [];

        // --- EXERCICE 1 ---
        let arc1 = generateSVGAngle(113.3, 40, 0, 33.7, 35, "1", "#ff453a", true);
        let arc2 = generateSVGAngle(213.3, 110, 180, 213.7, 35, "2", "#ff453a", true);
        const svgEx1 = `
            <svg class="geometry-svg" width="340" height="150" viewBox="0 0 340 150">
                <line x1="20" y1="40" x2="320" y2="40" stroke="#ffffff" stroke-width="2"/>
                <line x1="20" y1="110" x2="320" y2="110" stroke="#ffffff" stroke-width="2"/>
                <line x1="68" y1="10" x2="268" y2="145" stroke="#39ff14" stroke-width="2"/>
                <text x="325" y="44" fill="#8e8e93" font-size="12">d1</text>
                <text x="325" y="114" fill="#8e8e93" font-size="12">d2</text>
                <text x="55" y="15" fill="#8e8e93" font-size="12">Δ</text>
                ${arc1} ${arc2}
            </svg>`;
        quizQuestions.push({
            title: "Exercice 1 : Reconnaissance",
            svg: svgEx1,
            statement: "Sur cette figure, comment appelle-t-on la relation géométrique entre les angles rouges <b>1</b> et <b>2</b> formés par les droites (d1), (d2) et la sécante (Δ) ?",
            answer: "alternes-internes",
            hint: "Indice : regarde leur position de part et d'autre de la sécante verte.",
            check: function(u) {
                let s = u.toLowerCase().trim().replace(/ /g, "").replace(/-/g, "").replace(/é/g, "e");
                return s.includes("alterne") && s.includes("interne");
            }
        });

        // --- EXERCICE 2 ---
        let arc3 = generateSVGAngle(170, 75, -37, 0, 40, "x", "#007aff");
        let arc4 = generateSVGAngle(170, 75, 143, 180, 40, "y", "#007aff");
        const svgEx2 = `
            <svg class="geometry-svg" width="340" height="150" viewBox="0 0 340 160">
                <line x1="30" y1="75" x2="310" y2="75" stroke="#ffffff" stroke-width="2"/>
                <line x1="70" y1="150" x2="270" y2="0" stroke="#39ff14" stroke-width="2"/>
                <circle cx="170" cy="75" r="3" fill="#ffffff"/>
                <text x="170" y="96" fill="#ffffff" font-size="12" font-weight="bold" text-anchor="middle">O</text>
                ${arc3} ${arc4}
            </svg>`;
        quizQuestions.push({
            title: "Exercice 2 : Angles au sommet",
            svg: svgEx2,
            statement: "Les deux droites se coupent au point O. Les deux secteurs bleus marqués <b>x</b> et <b>y</b> désignent des angles...",
            answer: "opposes par le sommet",
            hint: "Indice : ils partagent le même sommet et sont dans le prolongement l'un de l'autre.",
            check: function(u) {
                let s = u.toLowerCase().trim().replace(/é/g, "e");
                return s.includes("oppose") && s.includes("sommet");
            }
        });

        // --- EXERCICE 3 ---
        let arc5 = generateSVGAngle(170, 95, -72, 0, 45, "72°", "#ff9500");
        let arc6 = generateSVGAngle(170, 95, -180, -72, 45, "?", "#39ff14", true);
        const svgEx3 = `
            <svg class="geometry-svg" width="340" height="150" viewBox="0 0 340 150">
                <line x1="20" y1="95" x2="320" y2="95" stroke="#ffffff" stroke-width="2"/>
                <line x1="170" y1="95" x2="144" y2="15" stroke="#007aff" stroke-width="2"/>
                ${arc5} ${arc6}
            </svg>`;
        quizQuestions.push({
            title: "Exercice 3 : Angles supplémentaires",
            svg: svgEx3,
            statement: "Ces deux angles forment ensemble un angle plat ($180^\\circ$) sur la droite blanche. Sachant que le secteur orange mesure <b>72°</b>, calcule la mesure du secteur vert marqué d'un <b>?</b> :",
            answer: "108",
            hint: "Calcule l'écart par rapport à un angle plat.",
            check: function(u) { return parseInt(u.trim()) === 108; }
        });

        // --- EXERCICE 4 ---
        let arc7 = generateSVGAngle(130, 130, 0, 135, 40, "125°", "#ff9500"); 
        let arc8 = generateSVGAngle(210, 50, 135, 180, 45, "?", "#39ff14", true); 
        const svgEx4 = `
            <svg class="geometry-svg" width="340" height="180" viewBox="0 0 340 180">
                <line x1="20" y1="50" x2="320" y2="50" stroke="#ffffff" stroke-width="2"/>
                <line x1="20" y1="130" x2="320" y2="130" stroke="#ffffff" stroke-width="2"/>
                <line x1="70" y1="20" x2="70" y2="160" stroke="#8e8e93" stroke-width="2"/>
                <line x1="100" y1="160" x2="240" y2="20" stroke="#39ff14" stroke-width="2"/>
                
                <rect x="70" y="50" width="10" height="10" fill="none" stroke="#39ff14" stroke-width="1.5"/>
                <rect x="70" y="120" width="10" height="10" fill="none" stroke="#39ff14" stroke-width="1.5"/>
                
                <text x="55" y="45" fill="#fff" font-size="12" font-weight="bold">A</text>
                <text x="55" y="145" fill="#fff" font-size="12" font-weight="bold">B</text>
                <text x="215" y="42" fill="#fff" font-size="12" font-weight="bold">C</text>
                <text x="115" y="145" fill="#fff" font-size="12" font-weight="bold">D</text>
                ${arc7} ${arc8}
            </svg>`;
        quizQuestions.push({
            title: "Exercice 4 : Propriétés combinées",
            svg: svgEx4,
            statement: "Les segments [AB] et [AC] sont perpendiculaires, tout comme [AB] et [BD]. La sécante verte crée un angle obtus de <b>125°</b> au sommet D. Calcule la mesure du secteur vert <b>̂ACD</b> en degrés :",
            answer: "35",
            hint: "Pense aux angles alternes-internes formés par les deux parallèles, puis retire l'angle droit.",
            check: function(u) { return parseInt(u.trim()) === 35; }
        });

        // --- EXERCICE 5 ---
        let arc9 = generateSVGAngle(131, 40, 42, 180, 35, "64°", "#39ff14");
        let arc10 = generateSVGAngle(209, 110, -138, 0, 35, "64°", "#39ff14");
        const svgEx5 = `
            <svg class="geometry-svg" width="340" height="160" viewBox="0 0 340 160">
                <line x1="20" y1="40" x2="320" y2="40" stroke="#ffffff" stroke-width="2"/>
                <line x1="20" y1="110" x2="320" y2="110" stroke="#ffffff" stroke-width="2"/>
                <line x1="95" y1="0" x2="245" y2="150" stroke="#ff9500" stroke-width="2"/>
                ${arc9} ${arc10}
            </svg>`;
        quizQuestions.push({
            title: "Exercice 5 : Réciproque",
            svg: svgEx5,
            statement: "Deux droites sont coupées par une sécante orange. Deux angles <b>alternes-internes</b> mis en évidence mesurent exactement <b>64°</b> chacun. Les deux droites blanches sont-elles parallèles ? (Réponds par <b>OUI</b> ou <b>NON</b>)",
            answer: "OUI",
            hint: "Rappel de cours : si deux angles alternes-internes sont égaux, alors...",
            check: function(u) { return u.toUpperCase().trim() === "OUI"; }
        });

        // --- EXERCICE 6 (CORRIGÉ : CONFIGURATION EN LIGNE BRISÉE / CONFIG EN M) ---
        // Sommet A(60, 40) sur d1, Sommet B(260, 120) sur d2.
        // Point brisé C(150, 90) flottant au milieu. Pas de triangle fermé ! Les droites parallèles sont indispensables.
        // Angle AC avec horizontale = 29.1°. Angle BC avec horizontale = 18.4°
        let arc11 = generateSVGAngle(60, 40, 0, 29.1, 40, "30°", "#ff453a"); // Angle rentrant sous d1
        let arc12 = generateSVGAngle(260, 120, -180, -161.6, 40, "20°", "#ff9500"); // Angle rentrant sur d2
        let arc13 = generateSVGAngle(150, 90, -161.6, 209.1, 35, "?", "#39ff14", true); // Angle total au centre
        const svgEx6 = `
            <svg class="geometry-svg" width="340" height="160" viewBox="0 0 340 160">
                <line x1="20" y1="40" x2="320" y2="40" stroke="#ffffff" stroke-width="2"/>
                <line x1="20" y1="120" x2="320" y2="120" stroke="#ffffff" stroke-width="2"/>
                
                <line x1="60" y1="40" x2="150" y2="90" stroke="#8e8e93" stroke-width="2"/>
                <line x1="150" y1="90" x2="260" y2="120" stroke="#8e8e93" stroke-width="2"/>
                
                <text x="50" y="35" fill="#fff" font-size="12" font-weight="bold">A</text>
                <text x="270" y="140" fill="#fff" font-size="12" font-weight="bold">B</text>
                <text x="145" y="75" fill="#fff" font-size="12" font-weight="bold">C</text>
                ${arc11} ${arc12} ${arc13}
            </svg>`;
        quizQuestions.push({
            title: "Exercice 6 : Synthèse",
            svg: svgEx6,
            statement: "Les deux droites blanches horizontales sont parallèles. La ligne brisée forme un angle au sommet C. En imaginant une troisième droite parallèle passant par C, calcule la mesure du secteur vert <b>̂ACB</b> :",
            answer: "50",
            hint: "Astuce : découpe l'angle vert en deux parties grâce aux propriétés des angles alternes-internes.",
            check: function(u) { return parseInt(u.trim()) === 50; }
        });
    }

    function startTest() {
        const nameInput = document.getElementById("student-name").value.trim();
        if (nameInput === "") { alert("Veuillez inscrire vos identifiants avant de commencer."); return; }
        studentName = nameInput;
        
        currentIndex = 0;
        score = 0;
        buildQuizData();
        
        document.getElementById("panel-login").style.display = "none";
        document.getElementById("panel-quiz").style.display = "block";
        
        loadQuestion();
    }

    function loadQuestion() {
        if (currentIndex >= quizQuestions.length) { endTest(); return; }
        const q = quizQuestions[currentIndex];
        
        document.getElementById("current-q").innerText = currentIndex + 1;
        document.getElementById("q-vector").innerHTML = q.svg;
        document.getElementById("q-statement").innerHTML = `<b>${q.title}</b><br><br>${q.statement}`;
        document.getElementById("q-hint").innerHTML = q.hint;
        
        const inputField = document.getElementById("user-answer");
        inputField.value = "";
        inputField.placeholder = "Ex: 50";
        inputField.focus();
        
        document.getElementById("progress-fill").style.width = (currentIndex / quizQuestions.length) * 100 + "%";
    }

    function submitAnswer() {
        if (currentIndex >= quizQuestions.length) return;
        const q = quizQuestions[currentIndex];
        let userAnswer = document.getElementById("user-answer").value.trim();
        if (!userAnswer) { alert("Tu dois écrire une réponse !"); return; }
        
        q.savedAns = userAnswer;
        if (q.check(userAnswer)) {
            q.status = "correct";
            score++;
        } else {
            q.status = "incorrect";
        }
        
        currentIndex++; 
        loadQuestion();
    }

    function skipQuestion() {
        if (currentIndex >= quizQuestions.length) return;
        const q = quizQuestions[currentIndex];
        q.status = "skipped"; 
        q.savedAns = "Non répondu ⏭️";
        currentIndex++; 
        loadQuestion();
    }

    function endTest() {
        document.getElementById("panel-quiz").style.display = "none";
        document.getElementById("panel-results").style.display = "block";
        
        document.getElementById("res-name").innerText = studentName;
        const displayGrade = document.getElementById("res-grade");
        displayGrade.innerText = `${score} / ${quizQuestions.length}`;
        
        if(score >= 5) displayGrade.style.color = "var(--accent-color)";
        else if(score >= 3) displayGrade.style.color = "#ff9500";
        else displayGrade.style.color = "#ff453a";

        const tableBody = document.getElementById("bilan-table-body");
        tableBody.innerHTML = ""; 
        
        for (let i = 0; i < quizQuestions.length; i++) {
            const q = quizQuestions[i];
            const row = document.createElement("tr");
            
            if (q.status === "correct") row.className = "row-correct";
            else if (q.status === "skipped") row.className = "row-skipped";
            else row.className = "row-incorrect";
            
            const badgeCorrection = q.status === "correct" 
                ? `<span>Correct ✅</span>` 
                : `<span style="font-weight:bold; color:#ff453a;">Attendu : ${q.answer}</span>`;
                
            row.innerHTML = `<td><strong>${q.title}</strong></td><td>${q.savedAns}</td><td>${badgeCorrection}</td>`;
            tableBody.appendChild(row);
        }
    }

    document.getElementById("user-answer").addEventListener("keyup", function(e) { 
        if (e.key === "Enter") submitAnswer(); 
    });
</script>
</body>
</html>
